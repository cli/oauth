on: [push, pull_request]

name: CI

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        go: [ '1.24', '1.25', '1.26' ]
        os: [ ubuntu-latest, macos-latest, windows-latest ]
      fail-fast: false

    name: Test suite
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: Run tests
        run: go test -v ./...
